<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpectralWeb - Client Control</title>

    <script src="../auth/auth_check.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jmuxer@2.0.5/dist/jmuxer.min.js"></script>

    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-content">
            <div class="nav-item active" data-target="desktop" title="Desktop">
                <i class="fas fa-desktop"></i>
                <span class="nav-label">Desktop</span>
            </div>
            <div class="nav-item" data-target="webcam" title="Webcam">
                <i class="fas fa-video"></i>
                <span class="nav-label">Webcam</span>
            </div>
        </div>

        <div class="sidebar-tab" id="sidebarToggle">
            <i class="fas fa-angles-left"></i>
        </div>
    </aside>

    <div class="app-main">
        <header class="header" id="header" data-active-mode="desktop">
            <div class="header-left">
                <div class="control-group for-desktop">
                    <button id="btn-desktop-stream" class="action-btn" title="Start/Stop Stream">
                        <i class="fas fa-play"></i>
                    </button>
                    <button id="btn-desktop-control" class="action-btn" title="Take Control">
                        <i class="fas fa-mouse-pointer"></i>
                    </button>
                    <button id="btn-terminal-toggle" class="action-btn" title="PowerShell Remote">
                        <i class="fas fa-terminal"></i>
                    </button>
                    <button id="btn-files-toggle" class="action-btn" title="File Manager">
                        <i class="fas fa-folder-open"></i>
                    </button>
                </div>

                <div class="control-group for-webcam">
                    <button id="btn-webcam-stream" class="action-btn" title="Toggle Webcam">
                        <i class="fas fa-camera"></i>
                    </button>
                </div>

                <div class="control-group global">
                    <div class="divider"></div>
                    <button id="btn-audio-pc" class="action-btn" title="PC Sound">
                        <i class="fas fa-volume-up"></i>
                    </button>
                    <button id="btn-audio-mic" class="action-btn" title="Microphone">
                        <i class="fas fa-microphone"></i>
                    </button>
                </div>
            </div>

            <div class="header-right">
                <div class="meta-item">
                    <span class="meta-label">ID</span>
                    <span id="display-id" class="meta-value">unknown</span>
                </div>

                <div class="meta-item">
                    <span class="meta-label">IP</span>
                    <span id="display-ip" class="meta-value">0.0.0.0</span>
                </div>

                <div class="status-capsule">
                    <span id="status-text" class="status-label">offline</span>
                    <div id="status-indicator" class="status-dot"></div>
                </div>
            </div>
        </header>

        <main class="workspace">
            
            <div id="terminal-overlay" class="terminal-overlay hidden">
                <div class="terminal-header">
                    <span><i class="fas fa-terminal" style="margin-right: 8px; opacity: 0.7;"></i> PowerShell Remote</span>
                </div>
                <div id="terminal-body" class="terminal-body"></div>
                <div class="terminal-input-area">
                    <input type="text" id="terminal-cmd" placeholder="Enter command..." autocomplete="off">
                </div>
            </div>

            <div id="files-overlay" class="terminal-overlay hidden">
                <div class="terminal-header">
                    <span><i class="fas fa-folder-open" style="margin-right: 8px; opacity: 0.7;"></i> File Explorer</span>
                </div>
                
                <div class="file-nav-bar">
                    <div class="file-nav-controls">
                        <button id="file-back-btn" class="file-nav-btn" title="Go Back">
                            <i class="fas fa-arrow-left"></i>
                        </button>
                        <button id="file-home-btn" class="file-nav-btn" title="Root Drives">
                            <i class="fas fa-home"></i>
                        </button>
                        <button id="file-view-btn" class="file-nav-btn" title="Toggle Hidden Files">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                    <div id="file-path-display">Computer</div>
                </div>

                <div id="files-body" class="files-grid">
                    </div>
            </div>

            <div id="view-desktop" class="view-panel active">
                <div class="canvas-wrapper" id="wrapper-desktop">
                    <video id="desktopVideo" autoplay muted playsinline></video>
                    <canvas id="desktopCanvas" tabindex="1"></canvas>
                    
                    <button class="fullscreen-btn" title="Toggle Fullscreen" data-target="wrapper-desktop">
                        <i class="fas fa-expand"></i>
                    </button>

                    <div class="stream-overlay" id="desktopOverlay">
                        <i class="fas fa-ghost"></i>
                        <p>No Desktop Data</p>
                    </div>
                </div>
            </div>
            
        </main>
    </div>

    <script type="module" src="js/client_control.js"></script>
</body>
</html>
